# Modular RAG MCP Server - Configuration
# Configured for ZhiPu AI (via OpenAI compatibility) and Ollama Embedding

# =============================================================================
# LLM Configuration (ZhiPu AI)
# =============================================================================
llm:
  provider: "openai"  # Use OpenAI client for compatibility
  model: "glm-4-flash"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  api_key: "644b74f96dfefd0647b8c327cb8ddaf9.v2uYcYRqJ7mgUBJZ"  # Replace with your actual ZhiPu API Key
  temperature: 0.1
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "ollama"
  model: "qwen3-embedding:4b"
  base_url: "http://localhost:11434"
  dimensions: 2560

# =============================================================================
# Vision LLM Configuration (ZhiPu AI)
# =============================================================================
vision_llm:
  enabled: true
  provider: "openai"  # Use OpenAI client for compatibility
  model: "glm-4v-flash"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  api_key: "644b74f96dfefd0647b8c327cb8ddaf9.v2uYcYRqJ7mgUBJZ"  # Replace with your actual ZhiPu API Key
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "opensearch"  # Options: chroma, opensearch
  collection_name: "de"
  persist_directory: "./data/db/chroma"  # For Chroma
  
  opensearch:
    hosts:
      - "http://localhost:9200"
    username: "admin"
    password: "admin"
    use_ssl: false
    verify_certs: false
    index_name: "base"
    timeout_seconds: 60
    max_retries: 3
    batch_size: 500
    max_concurrency: 10
    refresh: false

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "tei"
  model: "BAAI/bge-reranker-base"
  top_k: 5
  base_url: "http://localhost:8082"
  api_key: ""
  timeout: 30
  max_concurrency: 50

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: true
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    # - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Pipeline Configuration
# =============================================================================
ingestion:
  batch_size: 40
  sparse_enabled: false
  bm25_enabled: false
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: true  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement
  
  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: true  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment

# =============================================================================
# Loader Configuration
# =============================================================================
loader:
  provider: "docling"  # Options: pdf, docling
  docling:
    general:
      images_scale: 1.0
      generate_picture_images: true
      do_formula_recognition: true
      do_table_enrichment: true
      # do_pic_enrichment: false
      do_ocr: true
      accelerator_device: "CPU"
      accelerator_num_threads: 4
      max_concurrent_docs: 1
      timeout_seconds: 300
      image_output_dir: "./data/images"
    vlm:
      max_concurrency: 5
    llm:
      max_concurrency: 30

# =============================================================================
# Splitter Configuration
# =============================================================================
splitter:
  provider: "semantic_markdown"  # Options: recursive, semantic_markdown
  chunk_size: 1000
  chunk_overlap: 200

